<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>tome</title>
    <link rel="stylesheet" href="/app/styles.css" />
    <!-- app.js (an ES module, implicitly deferred) registers the Alpine
         component on `alpine:init`; it appears before alpine.min.js so it runs
         first and its listener is in place when Alpine starts. -->
    <script type="module" src="/app/app.js"></script>
    <script defer src="/app/vendor/alpine.min.js"></script>
  </head>
  <body x-data="tomeApp" x-cloak>
    <header class="topbar">
      <span class="brand">tome</span>
      <nav class="views">
        <a :class="{ active: view === 'page' }" :href="pageHref()" @click.prevent="showPage()">Page</a>
        <a :class="{ active: view === 'board' }" href="?view=board" @click.prevent="showBoard()">Board</a>
      </nav>
      <span class="hint" x-show="view === 'page'" x-text="pages.length + ' pages'"></span>
    </header>

    <!-- Page view: sidebar (vault tree) + content area -->
    <div class="layout" x-show="view === 'page'">
      <aside class="sidebar">
        <button type="button" class="new-page-btn" x-show="board.writable"
                @click="openNewPageModal()">+ New page</button>
        <nav class="tree">
          <template x-for="group of tree()" :key="group.project">
            <section class="tree-project">
              <button class="tree-project-head" @click="toggleProject(group.project)">
                <span class="twisty" x-text="collapsed[group.project] ? '▸' : '▾'"></span>
                <span x-text="group.project"></span>
              </button>
              <div class="tree-project-body" x-show="!collapsed[group.project]">
                <template x-for="folder of group.folders" :key="folder.name">
                  <div class="tree-folder">
                    <div class="tree-folder-name" x-show="folder.name" x-text="folder.label"></div>
                    <ul>
                      <template x-for="pg of folder.pages" :key="pg.slug">
                        <li>
                          <a class="tree-link"
                             :class="{ current: pg.slug === currentSlug }"
                             :href="'?page=' + encodeURIComponent(pg.slug)"
                             :title="pg.title"
                             @click.prevent="loadPage(pg.slug)"
                             x-text="pg.title"></a>
                        </li>
                      </template>
                    </ul>
                  </div>
                </template>
              </div>
            </section>
          </template>
        </nav>
      </aside>

      <main class="page">
        <template x-if="pageError">
          <p class="error" x-text="pageError"></p>
        </template>
        <template x-if="!pageError && pageMeta">
          <article>
            <div class="fm-card">
              <div class="fm-head">
                <h1 x-show="!fmEditing" x-text="pageMeta.title || currentSlug"></h1>
                <input x-show="fmEditing" class="fm-title-input" type="text"
                       x-model="fmForm.title" placeholder="Title" />
                <div class="fm-head-actions">
                  <button class="edit-btn" x-show="board.writable && pageMeta.type === 'project' && !editing && !fmEditing"
                          @click="openNewPageModal(currentPage.slug)">New in project</button>
                  <button class="edit-btn" x-show="board.writable && !editing && !fmEditing"
                          @click="enterFmEdit()">Edit frontmatter</button>
                  <button class="edit-btn" x-show="board.writable && !fmEditing"
                          @click="enterEdit()" x-text="editorLoading ? 'Loading…' : 'Edit'"
                          :disabled="editorLoading"></button>
                  <a class="edit-link" :href="editUrl()" title="Open in VS Code">VS Code</a>
                </div>
              </div>

              <dl x-show="!fmEditing">
                <template x-for="[k, v] of fmRows(pageMeta)" :key="k">
                  <div class="fm-row">
                    <dt x-text="k"></dt>
                    <dd x-text="Array.isArray(v) ? v.join(', ') : v"></dd>
                  </div>
                </template>
              </dl>

              <div class="fm-form" x-show="fmEditing">
                <p class="editor-banner" :class="'editor-banner--' + fmBannerKind"
                   x-show="fmBanner" x-text="fmBanner"></p>
                <ul class="editor-findings" x-show="fmFindings.length">
                  <template x-for="f of fmFindings" :key="f.code + f.path + f.message">
                    <li x-text="f.path + ' — ' + f.code + ': ' + f.message"></li>
                  </template>
                </ul>

                <div class="fm-field">
                  <label>Description</label>
                  <input type="text" x-model="fmForm.description" maxlength="140" />
                  <span class="fm-counter" x-text="fmForm.description.length + '/140'"></span>
                </div>

                <div class="fm-field">
                  <label>Tags</label>
                  <div class="fm-tags">
                    <template x-for="(tag, i) of fmForm.tags" :key="tag">
                      <span class="fm-tag-chip">
                        <span x-text="tag"></span>
                        <button type="button" class="fm-tag-remove" @click="removeFmTag(i)">&times;</button>
                      </span>
                    </template>
                  </div>
                  <select @change="addFmTag($event.target.value); $event.target.value = ''">
                    <option value="" disabled selected>Add a tag…</option>
                    <template x-for="t of tagSuggestions()" :key="t">
                      <option :value="t" x-text="t"></option>
                    </template>
                  </select>
                </div>

                <dl class="fm-readonly">
                  <div class="fm-row fm-row--slug">
                    <dt>slug</dt>
                    <dd>
                      <span x-show="!renaming" x-text="currentPage.slug"></span>
                      <button type="button" class="rename-btn" x-show="!renaming"
                              @click="enterRename()">Rename…</button>
                      <div class="rename-box" x-show="renaming">
                        <input type="text" class="rename-input" x-model="renameSlug"
                               placeholder="new-slug"
                               @keydown.enter.prevent="saveRename()" />
                        <div class="rename-actions">
                          <button type="button" class="editor-btn-reload"
                                  x-show="renameBannerKind === 'conflict'"
                                  @click="reloadAfterFmConflict()">Reload</button>
                          <button type="button" class="editor-btn-cancel"
                                  @click="cancelRename()">Cancel</button>
                          <button type="button" class="rename-confirm"
                                  @click="saveRename()" :disabled="renameSaving"
                                  x-text="renameSaving ? 'Renaming…' : 'Rename'"></button>
                        </div>
                        <p class="rename-warning">Renames the file and rewrites every inbound
                          <code>[[wikilink]]</code> across the wiki, then jumps to the new URL.</p>
                        <p class="editor-banner" :class="'editor-banner--' + renameBannerKind"
                           x-show="renameBanner" x-text="renameBanner"></p>
                        <ul class="editor-findings" x-show="renameFindings.length">
                          <template x-for="f of renameFindings" :key="f.code + f.path + f.message">
                            <li x-text="f.path + ' — ' + f.code + ': ' + f.message"></li>
                          </template>
                        </ul>
                      </div>
                    </dd>
                  </div>
                  <div class="fm-row"><dt>type</dt><dd x-text="pageMeta.type"></dd></div>
                  <div class="fm-row"><dt>project</dt><dd x-text="currentPage.project"></dd></div>
                  <div class="fm-row"><dt>status</dt><dd x-text="pageMeta.status || '—'"></dd></div>
                  <div class="fm-row"><dt>created</dt><dd x-text="pageMeta.created"></dd></div>
                  <div class="fm-row"><dt>updated</dt><dd x-text="pageMeta.updated"></dd></div>
                </dl>
                <p class="fm-hint" x-show="pageMeta.status">Status is managed from the board / at the task level.</p>

                <div class="editor-actions">
                  <button class="editor-btn-reload" x-show="fmBannerKind === 'conflict'"
                          @click="reloadAfterFmConflict()">Reload</button>
                  <button class="editor-btn-cancel" @click="cancelFmEdit()">Cancel</button>
                  <button class="editor-btn-save" @click="saveFmEdit()" :disabled="fmSaving"
                          x-text="fmSaving ? 'Saving…' : 'Save'"></button>
                </div>
              </div>
            </div>

            <template x-if="!editing">
              <div class="markdown" x-html="pageHtml" @click="onContentClick($event)"></div>
            </template>

            <template x-if="editing">
              <div class="editor-pane">
                <p class="editor-banner" :class="'editor-banner--' + editorBannerKind"
                   x-show="editorBanner" x-text="editorBanner"></p>
                <ul class="editor-findings" x-show="editorFindings.length">
                  <template x-for="f of editorFindings" :key="f.code + f.path + f.message">
                    <li x-text="f.path + ' — ' + f.code + ': ' + f.message"></li>
                  </template>
                </ul>
                <div x-ref="editorMount"></div>
                <div class="editor-actions">
                  <button class="editor-btn-reload" x-show="editorBannerKind === 'conflict'"
                          @click="reloadAfterConflict()">Reload</button>
                  <button class="editor-btn-cancel" @click="cancelEdit()">Cancel</button>
                  <button class="editor-btn-save" @click="saveEdit()" :disabled="saving"
                          x-text="saving ? 'Saving…' : 'Save'"></button>
                </div>
              </div>
            </template>
          </article>
        </template>
      </main>
    </div>

    <!-- New page modal ([[page-creation]]) -->
    <div class="modal-overlay" x-show="newPageOpen" x-cloak @click.self="closeNewPageModal()"
         @keydown.escape.window="if (newPageOpen) closeNewPageModal()">
      <div class="modal" role="dialog" aria-modal="true" aria-label="New page">
        <div class="modal-head">
          <h2>New page</h2>
          <button type="button" class="modal-close" @click="closeNewPageModal()">&times;</button>
        </div>

        <p class="editor-banner" :class="'editor-banner--' + newPageBannerKind"
           x-show="newPageBanner" x-text="newPageBanner"></p>
        <ul class="editor-findings" x-show="newPageFindings.length">
          <template x-for="f of newPageFindings" :key="f.code + f.path + f.message">
            <li x-text="f.path + ' — ' + f.code + ': ' + f.message"></li>
          </template>
        </ul>

        <div class="fm-field">
          <label>Type</label>
          <select x-model="newPageForm.type">
            <option value="" disabled>Choose a type…</option>
            <template x-for="t of typeEnum" :key="t">
              <option :value="t" x-text="t"></option>
            </template>
          </select>
        </div>

        <div class="fm-field" x-show="newPageForm.type !== 'project'">
          <label>Project</label>
          <select x-model="newPageForm.project">
            <option value="" disabled>Choose a project…</option>
            <template x-for="p of projectOptions()" :key="p.slug">
              <option :value="p.slug" x-text="p.title"></option>
            </template>
          </select>
        </div>

        <div class="fm-field">
          <label>Title</label>
          <input type="text" x-model="newPageForm.title" @input="onNewPageTitleInput()" placeholder="Title" />
        </div>

        <div class="fm-field">
          <label>Slug</label>
          <input type="text" x-model="newPageForm.slug" @input="newPageSlugTouched = true" placeholder="slug" />
          <span class="field-error" x-show="newPageSlugError()" x-text="newPageSlugError()"></span>
        </div>

        <div class="fm-field">
          <label>Description</label>
          <input type="text" x-model="newPageForm.description" maxlength="140" />
          <span class="fm-counter" x-text="newPageForm.description.length + '/140'"></span>
        </div>

        <div class="editor-actions">
          <button type="button" class="editor-btn-cancel" @click="closeNewPageModal()">Cancel</button>
          <button type="button" class="editor-btn-save" @click="saveNewPage()"
                  :disabled="newPageSaving || !newPageValid()"
                  x-text="newPageSaving ? 'Creating…' : 'Create'"></button>
        </div>
      </div>
    </div>

    <!-- Conflict resolver ([[conflict-resolution]]) — one dialog for all three
         entry points: a body edit, a frontmatter edit, or a stopped rebase.
         Left is always the user's side, right always the external one. -->
    <div class="modal-overlay" x-show="resolver" x-cloak>
      <div class="modal modal--wide resolver" role="dialog" aria-modal="true"
           aria-label="Resolve conflict" x-show="resolver">
        <template x-if="resolver">
          <div>
            <div class="resolver-head">
              <div>
                <h2 x-text="resolver.mode === 'git' ? 'Resolve a diverged history'
                                                    : 'Resolve this page'"></h2>
                <p class="resolver-source">
                  <span class="resolver-source-kind" x-text="resolver.source.headline"></span>
                  <span x-show="resolver.source.detail" x-text="' · ' + resolver.source.detail"></span>
                </p>
              </div>
              <div class="resolver-progress">
                <span x-show="resolverUndecided()"
                      x-text="resolverUndecided() + ' to decide'"></span>
                <span class="resolver-ready" x-show="!resolverUndecided()">ready to apply</span>
              </div>
            </div>

            <p class="resolver-file" x-show="resolver.mode === 'git'">
              <code x-text="resolver.path"></code>
              <span x-text="'— ' + resolver.state.files.length + ' file(s) left in this rebase'"></span>
            </p>

            <p class="editor-banner" :class="'editor-banner--' + resolver.bannerKind"
               x-show="resolver.banner" x-text="resolver.banner"></p>

            <div class="resolver-legend">
              <span class="resolver-col-label resolver-col-label--mine">Yours</span>
              <span class="resolver-col-label resolver-col-label--theirs"
                    x-text="resolver.mode === 'git' ? 'Remote' : 'On disk'"></span>
              <button type="button" class="resolver-bulk" x-show="resolverUndecided()"
                      @click="chooseAll('mine')">Keep all mine</button>
              <button type="button" class="resolver-bulk" x-show="resolverUndecided()"
                      @click="chooseAll('theirs')">Keep all theirs</button>
            </div>

            <!-- Frontmatter: one row per changed field, not a YAML diff. -->
            <div class="resolver-body" x-show="resolver.mode === 'frontmatter'">
              <p class="resolver-empty" x-show="!resolverFields().length">
                Nothing differs — both sides agree on every field.</p>
              <template x-for="hunk of resolverFields()" :key="hunk.id">
                <div>
                  <!-- Same split as the body: only a field both sides touched
                       is a question. -->
                  <template x-if="hunk.kind === 'conflict'">
                  <div class="resolver-hunk resolver-hunk--conflict">
                    <div class="resolver-hunk-label" x-text="hunk.label"></div>
                    <div class="resolver-sides">
                      <button type="button" class="resolver-side resolver-side--mine"
                              :class="{ chosen: hunk.choice === 'mine' }"
                              @click="chooseHunk(hunk, 'mine')">
                        <pre x-text="hunk.mine.join('\n') || '(empty)'"></pre>
                      </button>
                      <button type="button" class="resolver-side resolver-side--theirs"
                              :class="{ chosen: hunk.choice === 'theirs' }"
                              @click="chooseHunk(hunk, 'theirs')">
                        <pre x-text="hunk.theirs.join('\n') || '(empty)'"></pre>
                      </button>
                    </div>
                    <div class="resolver-actions-row">
                      <button type="button" :class="{ chosen: hunk.choice === 'mine' }"
                              @click="chooseHunk(hunk, 'mine')">Keep mine</button>
                      <button type="button" :class="{ chosen: hunk.choice === 'theirs' }"
                              @click="chooseHunk(hunk, 'theirs')">Keep theirs</button>
                      <button type="button" :class="{ chosen: hunk.choice === 'edit' }"
                              @click="chooseHunk(hunk, 'edit')">Edit…</button>
                    </div>
                    <input type="text" class="resolver-edit" x-show="hunk.choice === 'edit'"
                           x-model="hunk.editText" />
                  </div>
                  </template>

                  <template x-if="hunk.kind !== 'conflict'">
                  <div class="resolver-aside" :class="{ excluded: !oneSidedIncluded(hunk) }">
                    <div class="resolver-aside-head">
                      <span class="resolver-aside-field" x-text="hunk.label"></span>
                      <span x-text="oneSidedSource(hunk)"></span>
                      <span class="resolver-aside-state"
                            x-text="oneSidedIncluded(hunk) ? 'included' : 'excluded'"></span>
                      <button type="button" class="resolver-aside-toggle"
                              @click="toggleOneSided(hunk)"
                              x-text="oneSidedIncluded(hunk) ? 'Exclude' : 'Include'"></button>
                    </div>
                    <pre class="resolver-del" x-text="prefixed(hunk.base, '-')"></pre>
                    <pre class="resolver-add" x-text="prefixed(oneSidedAdded(hunk), '+')"></pre>
                  </div>
                  </template>
                </div>
              </template>
            </div>

            <!-- Body / git: line hunks, unchanged runs collapsed. -->
            <div class="resolver-body" x-show="resolver.mode !== 'frontmatter'">
              <template x-for="row of resolverRows()" :key="row.key">
                <div>
                  <template x-if="row.part === 'context'">
                    <pre class="resolver-context" x-text="row.lines.join('\n')"></pre>
                  </template>
                  <template x-if="row.part === 'gap'">
                    <div class="resolver-gap" x-text="'⋯ ' + row.elided + ' unchanged lines ⋯'"></div>
                  </template>

                  <!-- A true conflict: both sides changed it, so it gets the
                       full picker and blocks Apply until answered. -->
                  <template x-if="row.part === 'hunk' && row.hunk.kind === 'conflict'">
                  <div class="resolver-hunk resolver-hunk--conflict">
                    <div class="resolver-hunk-label">Both sides changed this</div>
                    <div class="resolver-sides">
                      <button type="button" class="resolver-side resolver-side--mine"
                              :class="{ chosen: row.hunk.choice === 'mine' }"
                              @click="chooseHunk(row.hunk, 'mine')">
                        <pre x-text="row.hunk.mine.join('\n') || '(nothing)'"></pre>
                      </button>
                      <button type="button" class="resolver-side resolver-side--theirs"
                              :class="{ chosen: row.hunk.choice === 'theirs' }"
                              @click="chooseHunk(row.hunk, 'theirs')">
                        <pre x-text="row.hunk.theirs.join('\n') || '(nothing)'"></pre>
                      </button>
                    </div>
                    <div class="resolver-actions-row">
                      <button type="button" :class="{ chosen: row.hunk.choice === 'mine' }"
                              @click="chooseHunk(row.hunk, 'mine')">Keep mine</button>
                      <button type="button" :class="{ chosen: row.hunk.choice === 'theirs' }"
                              @click="chooseHunk(row.hunk, 'theirs')">Keep theirs</button>
                      <button type="button" :class="{ chosen: row.hunk.choice === 'both' }"
                              @click="chooseHunk(row.hunk, 'both')">Keep both</button>
                      <button type="button" :class="{ chosen: row.hunk.choice === 'edit' }"
                              @click="chooseHunk(row.hunk, 'edit')">Edit…</button>
                    </div>
                    <textarea class="resolver-edit" rows="4" x-show="row.hunk.choice === 'edit'"
                              x-model="row.hunk.editText"></textarea>
                  </div>
                  </template>

                  <!-- Only one side changed it: already answered, so this
                       reports rather than asks — a -/+ diff and one toggle. -->
                  <template x-if="row.part === 'hunk' && row.hunk.kind !== 'conflict'">
                  <div class="resolver-aside" :class="{ excluded: !oneSidedIncluded(row.hunk) }">
                    <div class="resolver-aside-head">
                      <span x-text="oneSidedSource(row.hunk)"></span>
                      <span class="resolver-aside-state"
                            x-text="oneSidedIncluded(row.hunk) ? 'included' : 'excluded'"></span>
                      <button type="button" class="resolver-aside-toggle"
                              @click="toggleOneSided(row.hunk)"
                              x-text="oneSidedIncluded(row.hunk) ? 'Exclude' : 'Include'"></button>
                    </div>
                    <pre class="resolver-del" x-show="row.hunk.base.length"
                         x-text="prefixed(row.hunk.base, '-')"></pre>
                    <pre class="resolver-add" x-show="oneSidedAdded(row.hunk).length"
                         x-text="prefixed(oneSidedAdded(row.hunk), '+')"></pre>
                  </div>
                  </template>
                </div>
              </template>
            </div>

            <p class="resolver-warning" x-show="resolver.mode === 'git'">
              The vault is stopped mid-rebase. Resolving every file continues it;
              <strong>Abort</strong> puts the tree back exactly as it was before the pull.
            </p>

            <div class="editor-actions">
              <button type="button" class="editor-btn-cancel"
                      x-show="resolver.mode !== 'git'"
                      @click="closeResolver()">Cancel</button>
              <button type="button" class="editor-btn-cancel"
                      x-show="resolver.mode === 'git'" :disabled="resolver.busy"
                      @click="closeResolver()">Later</button>
              <button type="button" class="editor-btn-cancel"
                      x-show="resolver.mode === 'git'" :disabled="resolver.busy"
                      @click="abortRebase()">Abort rebase</button>
              <!-- `> 0` is load-bearing: Alpine only drops a boolean attribute
                   for null/undefined/false, so a bare count of 0 would leave
                   this disabled forever. -->
              <button type="button" class="editor-btn-save" @click="applyResolution()"
                      :disabled="resolver.busy || resolverUndecided() > 0"
                      x-text="resolver.busy ? 'Applying…'
                            : resolver.mode === 'git' ? 'Resolve file' : 'Apply & save'"></button>
            </div>
          </div>
        </template>
      </div>
    </div>

    <!-- Board view (full-width) -->
    <main class="board-wrap" x-show="view === 'board'">
      <div class="board-toolbar">
        <label>
          Project
          <select x-model="projectFilter">
            <option value="__all__">All projects</option>
            <template x-for="p of projects()" :key="p">
              <option :value="p" x-text="p"></option>
            </template>
          </select>
        </label>
        <span class="chip chip--readonly" x-show="!board.writable">read-only</span>
        <span class="total" x-text="visibleCards().length + ' tasks'"></span>
      </div>
      <p class="board-error" x-show="boardError" x-text="boardError"></p>
      <div class="board-columns">
        <template x-for="status of columns()" :key="status">
          <section class="board-column">
            <div class="col-head">
              <h2 x-text="status"></h2>
              <span class="count" x-text="cardsFor(status).length"></span>
            </div>
            <div class="col-body"
                 @dragover.prevent
                 @drop.prevent="onDrop($event, status)">
              <template x-for="card of cardsFor(status)" :key="card.id">
                <article class="card"
                         :draggable="board.writable"
                         :class="{ dragging: draggingId === card.id, moving: movingCardId === card.id }"
                         @dragstart="onDragStart($event, card)"
                         @dragend="onDragEnd">
                  <div class="card-meta">
                    <span class="card-id" x-text="card.rawId"></span>
                    <span class="card-prio" :data-prio="card.priority" x-show="card.priority" x-text="card.priority"></span>
                  </div>
                  <div class="card-title" x-text="card.title"></div>
                  <div class="card-chips">
                    <span class="chip" x-show="card.project" x-text="card.project"></span>
                    <span class="chip chip--milestone" x-show="card.milestone" x-text="card.milestone"></span>
                  </div>
                </article>
              </template>
            </div>
          </section>
        </template>
      </div>
    </main>
  </body>
</html>
